name: MLTB Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  TELEGRAM_API: ${{ secrets.TELEGRAM_API }}
  TELEGRAM_HASH: ${{ secrets.TELEGRAM_HASH }}
  OWNER_ID: ${{ secrets.OWNER_ID }}

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Create config.py
        run: |
          cat > config.py << PYEOF
          BOT_TOKEN = "${BOT_TOKEN}"
          TELEGRAM_API = ${TELEGRAM_API}
          TELEGRAM_HASH = "${TELEGRAM_HASH}"
          OWNER_ID = ${OWNER_ID}
          GDRIVE_ID = "11gMbmIjaJM8lTBEFa-J9pT2yDl_1D9dn"
          IS_TEAM_DRIVE = False
          YT_DLP_OPTIONS = {"cookiefile": "cookies.txt"}
          SEARCH_LIMIT = 20
          SEARCH_PLUGINS = [
              "https://raw.githubusercontent.com/qbittorrent/search-plugins/master/nova3/engines/piratebay.py",
              "https://raw.githubusercontent.com/qbittorrent/search-plugins/master/nova3/engines/limetorrents.py",
              "https://raw.githubusercontent.com/qbittorrent/search-plugins/master/nova3/engines/torlock.py",
              "https://raw.githubusercontent.com/qbittorrent/search-plugins/master/nova3/engines/torrentscsv.py",
              "https://raw.githubusercontent.com/qbittorrent/search-plugins/master/nova3/engines/eztv.py",
              "https://raw.githubusercontent.com/LightDestory/qBittorrent-Search-Plugins/master/src/engines/thepiratebay.py",
              "https://raw.githubusercontent.com/v1k45/1337x-qBittorrent-search-plugin/master/leetx.py",
          ]
          PYEOF

      - name: Create cookies.txt
        run: |
          cat > cookies.txt << 'COOKIEEOF'
          ${{ secrets.COOKIES }}
          COOKIEEOF

      - name: Build Docker image with config
        run: docker build . -t mltb-local

      - name: Run bot (auto-restart every ~5h)
        run: |
          while true; do
            echo "=== Container started at $(date) ==="
            timeout 19800 docker run --rm --network host mltb-local || true
            echo "=== Container stopped at $(date), restarting in 10s... ==="
            docker ps -aq | xargs -r docker rm -f 2>/dev/null || true
            sleep 10
          done
