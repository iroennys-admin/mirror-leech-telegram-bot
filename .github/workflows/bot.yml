name: MLTB Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  TELEGRAM_API: ${{ secrets.TELEGRAM_API }}
  TELEGRAM_HASH: ${{ secrets.TELEGRAM_HASH }}
  OWNER_ID: ${{ secrets.OWNER_ID }}

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Install everything
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 p7zip-full ffmpeg python3-venv
          python3 -m venv mltbenv
          source mltbenv/bin/activate
          pip install -q -r requirements.txt
          pip install -q -r requirements-cli.txt

      - name: Create config
        run: |
          cat > config.py << PYEOF
          BOT_TOKEN = "${BOT_TOKEN}"
          TELEGRAM_API = ${TELEGRAM_API}
          TELEGRAM_HASH = "${TELEGRAM_HASH}"
          OWNER_ID = ${OWNER_ID}
          GDRIVE_ID = "11gMbmIjaJM8lTBEFa-J9pT2yDl_1D9dn"
          IS_TEAM_DRIVE = False
          YT_DLP_OPTIONS = {"cookiefile": "cookies.txt"}
          PYEOF

      - name: Create cookies
        run: |
          cat > cookies.txt << 'COOKIEEOF'
          ${{ secrets.COOKIES }}
          COOKIEEOF

      - name: Run bot
        run: |
          source mltbenv/bin/activate
          # Start aria2 in background
          mkdir -p downloads
          aria2c --enable-rpc=true --rpc-listen-port=6800 --daemon=true \
            --dir=downloads --quiet=true 2>&1
          echo "aria2 started"
          # Run bot directly (no start.sh - skip update.py)
          python3 -m bot 2>&1 | tee /tmp/bot.log &
          BOTPID=$!
          echo "bot PID: $BOTPID"
          # Wait 30s then check if alive
          sleep 30
          if kill -0 $BOTPID 2>/dev/null; then
            echo "Bot running!"
            # Keep running for 5h
            sleep 17870
          else
            echo "Bot crashed! Last log lines:"
            tail -60 log.txt 2>/dev/null || echo "(no log.txt)"
          fi
