name: MLTB Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  TELEGRAM_API: ${{ secrets.TELEGRAM_API }}
  TELEGRAM_HASH: ${{ secrets.TELEGRAM_HASH }}
  OWNER_ID: ${{ secrets.OWNER_ID }}

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Create config and cookies
        run: |
          cat > config.py << PYEOF
          BOT_TOKEN = "${BOT_TOKEN}"
          TELEGRAM_API = ${TELEGRAM_API}
          TELEGRAM_HASH = "${TELEGRAM_HASH}"
          OWNER_ID = ${OWNER_ID}
          YT_DLP_OPTIONS = {"cookiefile": "cookies.txt"}
          PYEOF
          cat > cookies.txt << 'COOKIEEOF'
          ${{ secrets.COOKIES }}
          COOKIEEOF
          touch log.txt

      - name: Run bot in Docker container
        run: |
          while true; do
            echo "=== Container started at $(date) ==="
            timeout 17800 docker run --rm --network host \
              -v $PWD/config.py:/app/config.py \
              -v $PWD/cookies.txt:/app/cookies.txt \
              -v $PWD/log.txt:/app/log.txt \
              anasty17/mltb:latest \
              bash -c '
                source mltbenv/bin/activate
                pip install -q -r requirements.txt 2>&1 | tail -3
                bash start.sh 2>&1
              ' || true
            echo "=== Container stopped at $(date) ==="
            tail -30 log.txt 2>/dev/null || echo "(log vacío)"
            echo "=== Restarting in 10s ==="
            sleep 10
          done
